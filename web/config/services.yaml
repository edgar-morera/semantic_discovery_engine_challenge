services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/*/Domain/'

    App\Product\Domain\Repository\ProductRepository:
        alias: App\Product\Infrastructure\Persistence\Doctrine\DoctrineProductRepository
    App\Product\Domain\Port\EmbeddingService:
        alias: App\Product\Infrastructure\External\HuggingFaceEmbeddingService

    App\Product\Domain\Port\ProductSearchPort:
        alias: App\Product\Infrastructure\Persistence\Qdrant\QdrantProductSearchRepository

    App\Product\Infrastructure\External\HuggingFaceEmbeddingService:
        arguments:
            $apiKey: '%env(HUGGINGFACE_API_KEY)%'

    App\Product\Infrastructure\Persistence\Qdrant\QdrantProductSearchRepository:
        arguments:
            $qdrantDsn: '%env(QDRANT_DSN)%'