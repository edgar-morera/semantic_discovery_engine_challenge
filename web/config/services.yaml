services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/*/Domain/'

    App\Product\Domain\Repository\ProductRepository:
        alias: App\Product\Infrastructure\Persistence\Doctrine\DoctrineProductRepository
    App\Product\Domain\Port\EmbeddingService:
        alias: App\Product\Infrastructure\Cache\CachedEmbeddingService

    App\Product\Infrastructure\Cache\CachedEmbeddingService:
        arguments:
            $inner: '@App\Product\Infrastructure\External\HuggingFaceEmbeddingService'
            $cache: '@cache.embeddings'

    App\Product\Domain\Port\ProductSearchPort:
        alias: App\Product\Infrastructure\Persistence\Qdrant\QdrantProductSearchRepository

    App\Product\Domain\Port\ProductIdGenerator:
        alias: App\Product\Infrastructure\Identity\SymfonyUuidProductIdGenerator

    App\Product\Infrastructure\External\HuggingFaceEmbeddingService:
        arguments:
            $apiKey: '%env(HUGGINGFACE_API_KEY)%'
            $apiUrl: '%env(HUGGINGFACE_API_URL)%'
            $model: '%env(HUGGINGFACE_MODEL)%'
            $dimensions: '%env(int:EMBEDDING_DIMENSIONS)%'

    App\Product\Infrastructure\Persistence\Qdrant\QdrantProductSearchRepository:
        arguments:
            $qdrantDsn: '%env(QDRANT_DSN)%'

    App\Product\Infrastructure\Cli\SetupQdrantCommand:
        arguments:
            $qdrantDsn: '%env(QDRANT_DSN)%'
            $embeddingDimensions: '%env(int:EMBEDDING_DIMENSIONS)%'

    App\Product\Infrastructure\Cli\CleanK6TestDataCommand:
        arguments:
            $qdrantDsn: '%env(QDRANT_DSN)%'